<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Sugerencia</title>
</head>
<body>
    <header style="background-color: #2c3e50; color: white; padding: 1rem 0; text-align: center;">
        <h1 style="color: #ecf0f1;">Sugerencias</h1>
    </header>
    <form method= "get" action="">
        <label for="nombre" > 
            Nombre:
        </label>
        <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre aquí">
        <br><br>
        <label for="correo" > 
            Correo:
        </label>
        <input type="email" id="correo" name="correo" placeholder="Escribe tu correo aquí" required="required">
        <br><br>
        <label for="sugerencia" > 
            Escribe tu sugerencia aqui:
        </label>
        <textarea id="sugerencia" name="sugerencia" placeholder="Escribe tu sugerencia aquí" rows="5"></textarea>
       <br>
        <button type="submit" >
        Enviar sugerencia
    </button>
    </form>
</body>
</html>
